# Configuration Jekyll pour Portfolio Data Science
title: Fatima-Zahra BARHOU
description: Data Scientist & Machine Learning Engineer | Finance Background
author: Fatima-Zahra BARHOU
email: barhoufz@gmail.com
url: "https://fatima-zahrab.github.io"
baseurl: ""

# Thème
theme: minima
remote_theme: pages-themes/cayman@v0.2.0

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Configuration
markdown: kramdown
highlighter: rouge

# Réseaux sociaux
github_username: Fatima-ZahraB
linkedin_username: Fatima-Zahra BARHOU

# Collections pour projets
collections:
  projects:
    output: true
    permalink: /projects/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
